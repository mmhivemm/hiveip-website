        <text x="92" y="225" class="mono">H8ME</text>
        <circle cx="230" cy="102" r="54" fill="#e5f4ec" stroke="#1f8a4c" stroke-width="5"/>
        <path d="M206 102l18 18 36-44" class="line-green"/>
      </g>
</svg>