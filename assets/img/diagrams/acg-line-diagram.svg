<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ACG installed between the printer controller and coder</title>
  <desc id="desc">A simple production-line diagram showing a Best Before Date printer controller requesting a unique code from the ACG, which sends the code to the coder and prints it on a pack.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#F08E31"/>
    </marker>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fbf6ef"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="24" fill="url(#soft)"/>
  <g fill="#fff" stroke="#e5e5e5" stroke-width="2">
    <rect x="60" y="168" width="190" height="134" rx="16"/>
    <rect x="385" y="138" width="190" height="194" rx="18"/>
    <rect x="710" y="168" width="190" height="134" rx="16"/>
    <rect x="710" y="382" width="190" height="82" rx="14"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="155" y="214" font-size="18" font-weight="700" fill="#1A1A1A">BBD printer</text>
    <text x="155" y="241" font-size="14" fill="#6B6B6B">controller</text>
    <text x="155" y="268" font-size="13" fill="#6B6B6B">requests next print string</text>

    <text x="480" y="190" font-size="20" font-weight="700" fill="#1A1A1A">ACG</text>
    <text x="480" y="218" font-size="14" fill="#6B6B6B">Automated Code Generator</text>
    <text x="480" y="258" font-size="13" fill="#6B6B6B">generates a non-sequential</text>
    <text x="480" y="278" font-size="13" fill="#6B6B6B">unique code on demand</text>
    <text x="480" y="304" font-size="13" font-weight="700" fill="#C66515">no code list stored</text>

    <text x="805" y="214" font-size="18" font-weight="700" fill="#1A1A1A">Coder / print head</text>
    <text x="805" y="242" font-size="14" fill="#6B6B6B">prints BBD + unique code</text>

    <text x="805" y="410" font-size="16" font-weight="700" fill="#1A1A1A">Pack leaves line</text>
    <text x="805" y="434" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#C66515">03/03/26</text>
    <text x="805" y="454" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#C66515">HW4G9WF34E15</text>
  </g>
  <g fill="none" stroke="#F08E31" stroke-width="3" marker-end="url(#arrow)">
    <path d="M250 235H370"/>
    <path d="M575 235H695"/>
    <path d="M805 302V365"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#6B6B6B" text-anchor="middle">
    <text x="310" y="216">print request</text>
    <text x="635" y="216">code string</text>
  </g>
  <g transform="translate(426 72)">
    <rect x="0" y="0" width="108" height="50" rx="8" fill="#111"/>
    <rect x="12" y="12" width="28" height="26" fill="#F08E31"/>
    <rect x="44" y="12" width="18" height="26" fill="#BCBEC0"/>
    <rect x="66" y="12" width="30" height="26" fill="#BCBEC0"/>
  </g>
</svg>
