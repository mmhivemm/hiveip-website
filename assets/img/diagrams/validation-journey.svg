<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Hive IP validation journey</title>
  <desc id="desc">A compact data-flow diagram from pack code, to consumer entry, algorithmic validation, fraud signal and Consumer Support Panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset="1" stop-color="#f7f7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#151515" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#f28c28"/>
    </marker>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:27px;fill:#202020}
      .sub{font-family:Inter,Arial,sans-serif;font-weight:500;font-size:18px;fill:#626262}
      .micro{font-family:Inter,Arial,sans-serif;font-weight:700;font-size:18px;fill:#c85f0c}
      .chip{fill:#fff;border-radius:12px}
      .line{stroke:#f28c28;stroke-width:6;stroke-linecap:round;marker-end:url(#arrow)}
      .outline{stroke:#dfdfdc;stroke-width:3;fill:#fff}
      .dark{fill:#161616}
    </style>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <rect x="50" y="58" width="1100" height="559" rx="30" fill="#fff" opacity=".72"/>

  <text x="600" y="105" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800" fill="#202020" text-anchor="middle">Closed-loop validation journey</text>
  <text x="600" y="138" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#666" text-anchor="middle">Every entry becomes a validation decision, a fraud signal and a support record.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="210" width="180" height="210" rx="22" class="outline"/>
    <rect x="103" y="250" width="118" height="76" rx="10" fill="#f5f5f2" stroke="#d7d7d2" stroke-width="2"/>
    <rect x="119" y="270" width="86" height="20" rx="3" fill="#202020"/>
    <text x="162" y="302" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#202020" text-anchor="middle">HW4G9W</text>
    <text x="162" y="351" class="label" text-anchor="middle">Pack code</text>
    <text x="162" y="381" class="sub" text-anchor="middle">printed with BBD</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="210" width="180" height="210" rx="22" class="outline"/>
    <rect x="358" y="226" width="64" height="104" rx="13" fill="#1c1c1c"/>
    <rect x="368" y="240" width="44" height="68" rx="6" fill="#fbfbf8"/>
    <circle cx="390" cy="318" r="5" fill="#f28c28"/>
    <text x="390" y="351" class="label" text-anchor="middle">Consumer</text>
    <text x="390" y="381" class="sub" text-anchor="middle">enters or scans</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="528" y="195" width="206" height="240" rx="24" class="outline"/>
    <rect x="568" y="230" width="126" height="70" rx="14" class="dark"/>
    <rect x="587" y="250" width="28" height="30" fill="#f28c28"/>
    <rect x="623" y="250" width="22" height="30" fill="#bfc3c5"/>
    <rect x="653" y="250" width="26" height="30" fill="#bfc3c5"/>
    <text x="631" y="335" class="label" text-anchor="middle">Algorithmic</text>
    <text x="631" y="366" class="label" text-anchor="middle">validation</text>
    <text x="631" y="397" class="micro" text-anchor="middle">no database lookup</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="782" y="210" width="180" height="210" rx="22" class="outline"/>
    <circle cx="872" cy="276" r="42" fill="#fff6eb" stroke="#f28c28" stroke-width="5"/>
    <path d="M872 246 L897 294 H847 Z" fill="#f28c28"/>
    <rect x="867" y="265" width="10" height="23" rx="3" fill="#fff"/>
    <circle cx="872" cy="296" r="5" fill="#fff"/>
    <text x="872" y="351" class="label" text-anchor="middle">Fraud signal</text>
    <text x="872" y="381" class="sub" text-anchor="middle">risk score updates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="210" width="118" height="210" rx="22" class="outline"/>
    <rect x="1033" y="248" width="72" height="92" rx="9" fill="#202020"/>
    <rect x="1043" y="260" width="52" height="12" rx="3" fill="#f28c28"/>
    <rect x="1043" y="282" width="52" height="8" rx="3" fill="#d9ddde"/>
    <rect x="1043" y="300" width="36" height="8" rx="3" fill="#d9ddde"/>
    <rect x="1043" y="318" width="45" height="8" rx="3" fill="#d9ddde"/>
    <text x="1069" y="366" class="label" font-size="24" text-anchor="middle">Support</text>
    <text x="1069" y="394" class="sub" font-size="16" text-anchor="middle">panel</text>
  </g>

  <path class="line" d="M258 315 H286"/>
  <path class="line" d="M486 315 H512"/>
  <path class="line" d="M740 315 H768"/>
  <path class="line" d="M968 315 H996"/>

  <g>
    <rect x="92" y="478" width="1016" height="70" rx="18" fill="#fff" stroke="#dfdfdc" stroke-width="2"/>
    <text x="600" y="508" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="800" fill="#202020" text-anchor="middle">Outcome: valid entries redeem once, suspicious entries are flagged, support teams see the full audit trail.</text>
    <text x="600" y="535" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500" fill="#666" text-anchor="middle">The code itself is not checked against a master list; the validation is mathematical, fast and scalable.</text>
  </g>
</svg>
